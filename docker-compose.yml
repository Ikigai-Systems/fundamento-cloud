version: '3.7'
services:
  db:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=password
#    volumes:
#      - postgres:/var/lib/postgresql/data
  redis:
    image: redis

  rails:
    build:
      context: ./
      args:
        - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    ports:
      - '3000:3000'
    depends_on:
      - db
      - redis

volumes:
  postgres: