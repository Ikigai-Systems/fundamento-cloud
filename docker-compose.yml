services:
  postgresql:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'
  redis:
    image: redis
    ports:
      - '6379:6379'

  rails:
    build:
      context: ./
      args:
        - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    ports:
      - '3000:3000'
    depends_on:
      - postgresql
      - redis

volumes:
  postgres: