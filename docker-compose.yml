version: '3.7'
services:
  db:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=password
#    volumes:
#      - postgres:/var/lib/postgresql/data

  rails:
    build: ./
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    ports:
      - '3000:3000'
    depends_on:
      - db

volumes:
  postgres: