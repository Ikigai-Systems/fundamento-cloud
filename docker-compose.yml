x-minio-credentials: &minio-credentials
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: password
  MINIO_VOLUMES: /var/lib/minio/data
  MINIO_HOST: minio

x-rails-environment: &rails-environment
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:-abcdef}
  DATABASE_URL: postgres://postgres:password@postgresql/postgres
  REDIS_URL: redis://redis
  RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
  HTTP_HOST: ${HTTP_HOST:-localhost:3000}
  RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}

services:
  postgresql:
    image: postgres:17
    environment:
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 10s
      retries: 3
  redis:
    image: redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 10s
      retries: 3
  minio:
    image: quay.io/minio/minio:latest
    command:
      - server
      - --console-address
      - :9001
    environment:
      <<: *minio-credentials
    volumes:
      - minio:/var/lib/minio/data
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 10s
      retries: 3
  minio-initialization:
    image: quay.io/minio/mc:latest
    entrypoint: /bin/sh
    command: /minio-init.sh
    volumes:
      - ./dockerfiles/minio-init.sh:/minio-init.sh
    environment:
      <<: *minio-credentials
    depends_on:
      minio:
        condition: service_healthy
  website:
    build:
      context: ./
      target: ${RAILS_ENV:-production}
      args:
        - RAILS_ENV=${RAILS_ENV:-production}
      secrets:
        - fontawesome-auth
    environment:
      <<: *rails-environment
    ports:
      - '${RAILS_PORT:-3000}:3000'
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-initialization:
        condition: service_completed_successfully
  jobs:
    build:
      context: ./
      target: ${RAILS_ENV:-production}
      args:
        - RAILS_ENV=${RAILS_ENV:-production}
      secrets:
        - fontawesome-auth
    command: bundle exec good_job start
    environment:
      <<: *rails-environment
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-initialization:
        condition: service_completed_successfully
  blocknote-converter:
    build:
      context: ./micro-services/blocknote-converter
    ports:
      - '${BLOCKNOTE_PORT:-3002}:3002'

volumes:
  postgres:
  minio:

secrets:
  fontawesome-auth:
    file: dockerfiles/fontawesome-auth.secret