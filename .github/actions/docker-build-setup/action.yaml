name: "Docker Build Setup"
description: "Common setup for Docker image builds: Buildx, registry login, timestamp"
inputs:
  registry:
    description: "Container registry URL"
    required: false
    default: "ghcr.io"
  github-token:
    description: "GitHub token for registry authentication"
    required: true

outputs:
  timestamp:
    description: "Current UTC timestamp for tagging"
    value: ${{ steps.current-time.outputs.time }}

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Get current time
      id: current-time
      uses: josStorer/get-current-time@v2
