name: 'Setup SOPS with age'
description: 'Install age and SOPS, and configure age key for secrets decryption'
inputs:
  age-key:
    description: 'Age private key for SOPS decryption'
    required: true
  export-for-docker:
    description: 'Export SOPS_AGE_KEY as environment variable for Docker builds'
    required: false
    default: 'false'
  sops-version:
    description: 'SOPS version to install'
    required: false
    default: '3.11.0'
runs:
  using: "composite"
  steps:
    - name: Setup SOPS
      uses: nhedger/setup-sops@v2
      with:
        version: ${{ inputs.sops-version }}

    - name: Install age
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get install -y age

    - name: Setup SOPS age key
      shell: bash
      run: |
        mkdir -p ~/.config/sops/age
        echo "${{ inputs.age-key }}" > ~/.config/sops/age/keys.txt
        chmod 600 ~/.config/sops/age/keys.txt

    - name: Export SOPS_AGE_KEY for Docker
      if: inputs.export-for-docker == 'true'
      shell: bash
      run: |
        # Export SOPS_AGE_KEY for Docker build (using heredoc for multi-line)
        echo "SOPS_AGE_KEY<<EOF" >> $GITHUB_ENV
        echo "${{ inputs.age-key }}" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
