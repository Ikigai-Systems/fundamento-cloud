name: Run E2E Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-tests]')"

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install age and sops
        run: |
          sudo apt-get update && sudo apt-get install -y age
          SOPS_VERSION=$(curl -s https://api.github.com/repos/getsops/sops/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          wget -qO- https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64 | sudo tee /usr/local/bin/sops > /dev/null
          sudo chmod +x /usr/local/bin/sops

      - name: Setup SOPS age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt
          # Export SOPS_AGE_KEY for Docker build
          echo "SOPS_AGE_KEY=${{ secrets.SOPS_AGE_KEY }}" >> $GITHUB_ENV

      - name: Decrypt and export secrets
        run: |
          # Extract FontAwesome token and create secret file for Docker
          sops -d --extract '["fontawesome"]["auth_token"]' config/secrets/test.sops.yaml > dockerfiles/fontawesome-auth.secret
          chmod 600 dockerfiles/*.secret

          # Export FontAwesome token for bundle install
          echo "BUNDLE_DL__FONTAWESOME__COM=$(cat dockerfiles/fontawesome-auth.secret)" >> $GITHUB_ENV

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          detached: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          cache: "npm"

      - run: npm ci

      - uses: hoverkraft-tech/compose-action@v2.0.1

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          project: ./spec/e2e
          install: false # already installed by `npm ci`
          wait-on: http://localhost:3000
          config: baseUrl=http://localhost:3000
        env:
          DEBUG: "@cypress/github-action"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: log/cypress/screenshots
          if-no-files-found: warn # 'warn' or 'error' are also available, defaults to `warn`

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: log/cypress/videos
          if-no-files-found: warn # 'warn' or 'error' are also available, defaults to `warn`
