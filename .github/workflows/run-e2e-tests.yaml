name: Run E2E Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

env:
  RAILS_ENV: test
  DATABASE_URL: postgres://postgres:password@localhost/postgres

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest

    env:
      BUNDLE_USERNAME__DL_FONT_AWESOME__COM: token
      BUNDLE_PASSWORD__DL_FONT_AWESOME__COM: ${{ secrets.FONTAWESOME_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          cache: "npm"
      - run: npm ci
      - uses: hoverkraft-tech/compose-action@v2.0.1
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          project: ./spec/e2e
          install: false # already installed by `npm ci`
          wait-on: http://localhost:3000
          config: baseUrl=http://localhost:3000
        env:
          DEBUG: "@cypress/github-action"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: log/cypress/screenshots
          if-no-files-found: warn # 'warn' or 'error' are also available, defaults to `warn`
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: log/cypress/videos
          if-no-files-found: warn # 'warn' or 'error' are also available, defaults to `warn`
