name: Run E2E Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-tests]')"

    permissions:
      contents: read
      checks: write  # Required for mikepenz/action-junit-report

    env:
      RAILS_ENV: e2e
      DATABASE_URL: postgres://postgres:password@localhost/postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SOPS with age
        uses: ./.github/actions/setup-sops
        with:
          age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Decrypt and export secrets
        run: |
          # Extract FontAwesome token and create secret file for Docker
          sops -d --extract '["fontawesome"]["auth_token"]' config/secrets/test.sops.yaml > dockerfiles/fontawesome-auth.secret
          chmod 600 dockerfiles/fontawesome-auth.secret

          # Extract Rails master key for credential decryption
          RAILS_MASTER_KEY=$(sops -d --extract '["rails"]["master_key"]' config/secrets/e2e.sops.yaml)
          echo "RAILS_MASTER_KEY=${RAILS_MASTER_KEY}" >> $GITHUB_ENV

          # Export FontAwesome token for bundle install
          echo "BUNDLE_DL__FONTAWESOME__COM=$(cat dockerfiles/fontawesome-auth.secret)" >> $GITHUB_ENV

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          detached: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: actions/setup-node@v6
        with:
          cache: "npm"

      - run: npm ci

      - uses: hoverkraft-tech/compose-action@v2.5.0
        env:
          RAILS_MASTER_KEY: ${{ env.RAILS_MASTER_KEY }}

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          project: ./spec/e2e
          install: false # already installed by `npm ci`
          wait-on: http://localhost:3000
          config: baseUrl=http://localhost:3000
        env:
          DEBUG: "@cypress/github-action"
        continue-on-error: true  # Allow workflow to continue to publish results

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-results
          path: tmp/cypress-results-*.xml
          retention-days: 30
          if-no-files-found: error

      - name: Publish E2E test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'tmp/cypress-results-*.xml'
          check_name: Cypress E2E Test Results
          summary: true
          detailed_summary: true
          annotate_only: false
          fail_on_failure: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: log/cypress/screenshots
          retention-days: 7  # Shorter retention for debug artifacts
          if-no-files-found: warn

      - name: Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-videos
          path: log/cypress/videos
          retention-days: 7  # Shorter retention for debug artifacts
          if-no-files-found: warn
