name: Run Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-tests]')"

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SOPS with age
        uses: ./.github/actions/setup-sops
        with:
          age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Decrypt and export secrets
        run: |
          # Extract FontAwesome token and set as environment variable
          echo "BUNDLE_DL__FONTAWESOME__COM=$(sops -d --extract '["fontawesome"]["auth_token"]' config/secrets/test.sops.yaml)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          cache: "npm"

      # Test the formula-eval package
      - run: npm ci
        working-directory: micro-services/formula-eval
      - run: npm run test --if-present
        working-directory: micro-services/formula-eval
      - run: npm run build --if-present
        working-directory: micro-services/formula-eval

      # Test the blocknote-converter package
      - run: npm ci
        working-directory: micro-services/blocknote-converter
      - run: npm run test --if-present
        working-directory: micro-services/blocknote-converter
      - run: npm run converter:build --if-present
        working-directory: micro-services/blocknote-converter

      # Install dependencies
      - run: npm ci
      - run: npm run build --if-present

      # Run rspec
      - uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          services: |
            postgresql
            redis

      - name: Setup the database
        run: bin/rails db:setup

      - name: Rebuild tailwind.css
        run: bin/rails test:prepare

      - name: Run specs
        run: bin/rspec