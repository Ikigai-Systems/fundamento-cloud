name: Run Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ "*" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-tests]')"

    permissions:
      contents: read
      checks: write

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/postgres

    steps:
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SOPS with age
        uses: ./.github/actions/setup-sops
        with:
          age-key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Decrypt and export secrets
        run: |
          # Extract FontAwesome token and set as environment variable
          echo "BUNDLE_DL__FONTAWESOME__COM=$(sops -d --extract '["fontawesome"]["auth_token"]' config/secrets/test.sops.yaml)" >> $GITHUB_ENV

          # Extract Rails master key for credential decryption
          echo "RAILS_MASTER_KEY=$(sops -d --extract '["rails"]["master_key"]' config/secrets/test.sops.yaml)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/setup-node@v6
        with:
          cache: "npm"

      # Test the blocknote-converter package
      - run: npm ci
        working-directory: micro-services/blocknote-converter
      - run: npm run test --if-present
        working-directory: micro-services/blocknote-converter
      - run: npm run build --if-present
        working-directory: micro-services/blocknote-converter

      # Install dependencies
      - run: npm ci
      - run: npm run build --if-present

      # Run rspec
      - uses: hoverkraft-tech/compose-action@v2.5.0
        with:
          services: |
            postgresql
            redis

      - name: Setup the database
        run: bin/rails db:setup

      - name: Rebuild tailwind.css
        run: bin/rails test:prepare

      - name: Run specs
        run: |
          bin/rspec \
            --format progress \
            --format RspecJunitFormatter \
            --out tmp/rspec-results.xml
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rspec-results
          path: tmp/rspec-results.xml
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: tmp/rspec-results.xml
          check_name: RSpec Test Results
          summary: true
          detailed_summary: true
          annotate_only: false
          fail_on_failure: true